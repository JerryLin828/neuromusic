# NeuroMusic — Unified Configuration
#
# Every script reads from this file. Run any script with:
#   python -m <module> --config configs/default.yaml
#
# Or just use the default (no flags needed):
#   python -m src.pipeline.run --dreamer-sample 42
#   python -m src.biosignal.train_dreamer --dimension arousal
#   python -m evaluation.run_full_eval
#   python -m src.pipeline.demo
#   python data/scripts/download_dreamer.py

# --- Paths ---
# All paths are relative to the project root unless absolute.
paths:
  data_dir: "data/raw/dreamer"           # DREAMER dataset root
  checkpoint_dir: "checkpoints/dreamer"   # training output root
  output_dir: "outputs"                   # pipeline output
  eval_dir: "evaluation/full_eval_with_prompts_100"        # evaluation output
  hf_cache_dir: null                      # HuggingFace cache (null = system default; set for cluster use)

# --- EEG Emotion Classification ---
biosignal:
  backend: "dreamer"                      # only "dreamer" supported currently

  dreamer:
    model_name: "tsception"               # "tsception" or "eegnet"
    arousal_checkpoint: "checkpoints/dreamer/arousal/tsception/best.ckpt"
    valence_checkpoint: "checkpoints/dreamer/valence/tsception/best.ckpt"

# --- Training ---
training:
  max_epochs: 50
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 1.0e-4
  val_fraction: 0.1                       # fraction of training data used for validation
  test_fraction: 0.2                      # per-subject test split fraction
  early_stopping_patience: 10
  seed: 42
  num_workers: 0                          # dataloader workers (0 = main process)

# --- LLM Bridge (Emotion -> Music Prompt) ---
bridge:
  backend: "gemini"                       # "template" or "gemini"

  gemini:
    model: "gemini-2.5-flash"             # Gemini model name
    temperature: 0.7
    max_output_tokens: 200
    # Set GEMINI_API_KEY or GOOGLE_API_KEY environment variable

# --- Music Generation ---
musicgen:
  model_name: "facebook/musicgen-small"   # small / medium / large / melody
  duration: 15                            # seconds of audio to generate
  temperature: 1.0
  top_k: 250
  top_p: 0.0
  cfg_coef: 3.0

# --- Evaluation ---
evaluation:
  n_per_quadrant: 100                     # samples per emotion quadrant
  duration: 10.0                          # audio duration for eval (can differ from musicgen.duration)
  seed: 42

# --- Demo ---
demo:
  port: 7860
  share: true
  example_samples: [42, 100, 5000, 50000]
